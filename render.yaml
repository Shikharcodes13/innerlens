services:
  - type: web
    name: innerlens-api
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 4000
      - key: PUPPETEER_SKIP_DOWNLOAD
        value: "true"
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        value: InnerLens <onboarding@resend.dev>
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_WHATSAPP_FROM
        sync: false
      - key: WHATSAPP_REPORT_CONTENT_SID
        sync: false
      - key: BACKEND_PUBLIC_URL
        value: https://innerlens-api.onrender.com
      - key: APP_PUBLIC_URL
        value: https://innerlens-assessment.netlify.app
